<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olá, Nuvem</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      main {
        text-align: center;
        padding: 30px;
        max-width: 560px;
      }

      h1 {
        font-size: 42px;
        margin: 0 0 10px;
      }

      #status {
        font-size: 18px;
        color: #cbd5e1;
        min-height: 54px;
        line-height: 1.5;
      }

      #frase {
        margin-top: 18px;
        font-size: 17px;
        color: #bae6fd;
        font-style: italic;
        min-height: 40px;
      }

      input {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        width: 100%;
        max-width: 300px;
        box-sizing: border-box;
      }

      .botoes {
        margin-top: 18px;
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        background: #38bdf8;
        color: #0f172a;
        border: none;
        padding: 12px 22px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #7dd3fc;
      }

      .erro {
        color: #fecaca;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Olá, Nuvem</h1>

      <input id="nome" type="text" placeholder="Digite seu nome" />

      <p id="status">Clique em um botão para buscar dados do servidor.</p>

      <p id="frase"></p>

      <div class="botoes">
        <button id="btnHora">Buscar hora</button>
        <button id="btnSorteio">Sortear número</button>
      </div>
    </main>

    <script>
      const URL_DO_WORKER = "https://projeto-cloud777.bruno-maciel77777.workers.dev";

      async function buscarHora() {
        const status = document.getElementById("status");
        const frase = document.getElementById("frase");
        const nome = document.getElementById("nome").value.trim();

        status.classList.remove("erro");
        status.textContent = "Buscando hora...";
        frase.textContent = "";

        try {
          let url = URL_DO_WORKER + "/hora";

          if (nome !== "") {
            url += "?nome=" + encodeURIComponent(nome);
          }

          const resposta = await fetch(url);

          if (!resposta.ok) {
            throw new Error("Erro " + resposta.status);
          }

          const dados = await resposta.json();

          status.textContent =
            dados.mensagem + " Hora do servidor: " + dados.horaDoServidor;

          frase.textContent = dados.fraseDoDia;
        } catch (erro) {
          status.classList.add("erro");
          status.textContent =
            "Não consegui buscar a hora. Confira se a rota /hora existe no Worker.";
          frase.textContent = "";
        }
      }

      async function buscarSorteio() {
        const status = document.getElementById("status");
        const frase = document.getElementById("frase");

        status.classList.remove("erro");
        status.textContent = "Sorteando número...";
        frase.textContent = "";

        try {
          const resposta = await fetch(URL_DO_WORKER + "/sorteio");

          if (!resposta.ok) {
            throw new Error("Erro " + resposta.status);
          }

          const dados = await resposta.json();

          status.textContent = "Número sorteado: " + dados.numeroSorteado;
          frase.textContent = dados.fraseDoDia;
        } catch (erro) {
          status.classList.add("erro");
          status.textContent =
            "Não consegui sortear o número. Confira se a rota /sorteio existe no Worker.";
          frase.textContent = "";
        }
      }

      document.getElementById("btnHora").addEventListener("click", buscarHora);
      document
        .getElementById("btnSorteio")
        .addEventListener("click", buscarSorteio);
    </script>
  </body>
</html>
